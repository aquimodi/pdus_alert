# =============================================================================
# Nginx Configuration - Energy Monitoring System (Windows)
# =============================================================================
#
# REQUISITOS PREVIOS - Crear estos directorios ANTES de arrancar Nginx:
#
#   PowerShell:
#   New-Item -ItemType Directory -Force -Path @(
#       "D:\nginx\temp\client_body_temp",
#       "D:\nginx\temp\proxy_temp",
#       "D:\nginx\temp\fastcgi_temp",
#       "D:\nginx\temp\uwsgi_temp",
#       "D:\nginx\temp\scgi_temp",
#       "D:\nginx\logs",
#       "D:\nginx\html"
#   )
#
# VERIFICAR CONFIGURACION:
#   cd D:\nginx && nginx.exe -t
#
# =============================================================================

worker_processes 1;
worker_shutdown_timeout 10s;
error_log D:/nginx/logs/error.log info;
pid D:/nginx/logs/nginx.pid;

events {
    worker_connections 1024;
    use select;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    client_body_temp_path D:/nginx/temp/client_body_temp;
    proxy_temp_path D:/nginx/temp/proxy_temp;
    fastcgi_temp_path D:/nginx/temp/fastcgi_temp;
    uwsgi_temp_path D:/nginx/temp/uwsgi_temp;
    scgi_temp_path D:/nginx/temp/scgi_temp;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    log_format upstream_debug '$remote_addr [$time_local] "$request" '
                              'status=$status upstream_status=$upstream_status '
                              'upstream_addr=$upstream_addr '
                              'upstream_response_time=$upstream_response_time '
                              'request_time=$request_time '
                              'upstream_connect_time=$upstream_connect_time '
                              'body_bytes=$body_bytes_sent';

    log_format detailed '[$time_iso8601] '
                        'client=$remote_addr '
                        'method=$request_method '
                        'uri="$request_uri" '
                        'protocol=$server_protocol '
                        'status=$status '
                        'bytes_sent=$bytes_sent '
                        'body_bytes=$body_bytes_sent '
                        'request_time=$request_time '
                        'upstream_addr=$upstream_addr '
                        'upstream_status=$upstream_status '
                        'upstream_response_time=$upstream_response_time '
                        'upstream_connect_time=$upstream_connect_time '
                        'connection=$connection '
                        'connection_requests=$connection_requests '
                        'referer="$http_referer" '
                        'user_agent="$http_user_agent"';

    access_log D:/nginx/logs/access.log main;
    access_log D:/nginx/logs/access-detailed.log detailed;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10M;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml+rss;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    upstream energy_api {
        server 127.0.0.1:3001 max_fails=3 fail_timeout=30s;
        server 127.0.0.1:3002 backup max_fails=3 fail_timeout=30s;
        keepalive 8;
    }

    server {
        listen 80;
        server_name localhost energy-monitor.local;
        root D:/nginx/pdus/dist;
        index index.html;

        access_log D:/nginx/logs/energy-monitor-access.log main;
        access_log D:/nginx/logs/energy-monitor-detailed.log detailed;
        error_log D:/nginx/logs/energy-monitor-error.log info;

        server_tokens off;

        location / {
            try_files $uri $uri/ /index.html;

            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, no-transform";
            }
        }

        location /api/ {
            access_log D:/nginx/logs/upstream-debug.log upstream_debug;
            access_log D:/nginx/logs/api-detailed.log detailed;

            proxy_pass http://energy_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 300s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 300s;

            proxy_next_upstream error timeout http_502 http_503;
            proxy_next_upstream_timeout 15s;
            proxy_next_upstream_tries 2;

            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, Authorization";
        }

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        error_page 500 502 503 504 /50x.html;

        location = /50x.html {
            root D:/nginx/html;
        }
    }
}
